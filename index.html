<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keypress + Attention Game</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
        <h1>Keypress + Attention</h1>
        <p>Instructions:</p>
        <ul id="instruction-list">
            <li>Press 'A' when a letter (A-Z) appears.</li>
            <li>Press 'L' when a number (0-9) appears.</li>
            <li>The game ends after 20 random letters/numbers.</li>
        </ul>
        <button id="new-game-btn">New Game</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div id="game-box">
            <span id="char-display">?</span>
        </div>

        <div id="game-info">
            <!-- Correct, Wrong, Time will appear here -->
        </div>

        <button id="quit-btn" class="quit-btn">Quit Game</button>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
        <h1>Game Result</h1>
        <p>Correct Moves: <span id="result-correct"></span></p>
        <p>Wrong Moves: <span id="result-wrong"></span></p>
        <p>Total Time: <span id="result-time"></span> s</p>
        <p>Average Time per Keypress: <span id="result-avg"></span> s</p>
        <button id="home-btn">Home</button>
        <button id="retry-btn">Retry</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
